zabbix_export:
  version: '7.0'
  template_groups:
  - uuid: c8bb804cfbbd4128975e12db65aa0687
    name: Templates/Network devices
  templates:
  - uuid: 377ff8cffa794233ba75c18b6aa8c9a3
    template: HPE Aruba Central NG - Gateway
    name: HPE Aruba Central NG - Gateway
    description: Health checks for the HPE Aruba Central NG gateway/cache service.
    groups:
    - name: Templates/Network devices
    macros:
    - macro: '{$CENTRAL.GATEWAY.URL}'
      value: http://127.0.0.1:8080
      description: Base URL of the local Central gateway/cache service.
    - macro: '{$CENTRAL.GATEWAY.POLL_INTERVAL}'
      value: 1m
      description: Gateway health polling interval.
    - macro: '{$CENTRAL.TEMPLATE.VERSION}'
      value: 2.0.0-dev3
      description: Version of this template package.
    items:
    - uuid: e77cd7deb4b645d8a881aab339804248
      name: Gateway health raw
      type: HTTP_AGENT
      key: central.gateway.health.raw
      delay: '{$CENTRAL.GATEWAY.POLL_INTERVAL}'
      history: '0'
      trends: '0'
      value_type: TEXT
      url: '{$CENTRAL.GATEWAY.URL}/api/v1/health'
      request_method: GET
      timeout: 10s
      status_codes: '200'
      tags:
      - tag: component
        value: gateway
    - uuid: c5197dad779b4a48a6da2e1918b3238a
      name: Gateway status
      type: DEPENDENT
      key: central.gateway.status
      value_type: CHAR
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.gateway.status
      master_item:
        key: central.gateway.health.raw
      triggers:
      - uuid: 386501bdef40492c8705f6e70f534411
        expression: last(/HPE Aruba Central NG - Gateway/central.gateway.status)<>"ok"
        name: 'HPE Central gateway: status is not ok'
        priority: HIGH
    - uuid: 1309a02d2e384bde88dca851288f9594
      name: Gateway version
      type: DEPENDENT
      key: central.gateway.version
      value_type: CHAR
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.gateway.version
      master_item:
        key: central.gateway.health.raw
    - uuid: d239394651e043b8a169ef1401c27639
      name: Gateway managed device count
      type: DEPENDENT
      key: central.gateway.device_count
      value_type: UNSIGNED
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.state.device_count
      master_item:
        key: central.gateway.health.raw
    - uuid: a83639c195f54c5584c3c0b471576a86
      name: Gateway package status
      type: DEPENDENT
      key: central.gateway.package_status
      value_type: CHAR
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.package.status
      master_item:
        key: central.gateway.health.raw
      triggers:
      - uuid: a36f7f7145154f699adbfb5c0f126406
        expression: last(/HPE Aruba Central NG - Gateway/central.gateway.package_status)="outdated"
        name: 'HPE Central gateway: package update available'
        priority: WARNING
    - uuid: b1470eefeee14533bafe3b424ad2c94d
      name: Gateway latest app version
      type: DEPENDENT
      key: central.gateway.app_latest_version
      value_type: CHAR
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.package.app.latest
      master_item:
        key: central.gateway.health.raw
    - uuid: 5cecb6e6bad64708a4fc732b3083b0be
      name: Gateway latest template version
      type: DEPENDENT
      key: central.gateway.template_latest_version
      value_type: CHAR
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.package.template.latest
      master_item:
        key: central.gateway.health.raw

  - uuid: 06555628289844408980746ebc6ea54c
    template: HPE Aruba Central NG - AP
    name: HPE Aruba Central NG - AP
    description: AP monitoring through the HPE Aruba Central NG gateway/cache service.
    groups:
    - name: Templates/Network devices
    macros:
    - macro: '{$CENTRAL.GATEWAY.URL}'
      value: http://127.0.0.1:8080
    - macro: '{$CENTRAL.DEVICE.KEY}'
      value: ''
    - macro: '{$CENTRAL.AP.POLL_INTERVAL}'
      value: 5m
    items:
    - uuid: 443bf5425ad14ea99b0cd7c23b0cebaf
      name: AP raw master item
      type: HTTP_AGENT
      key: central.device.raw
      delay: '{$CENTRAL.AP.POLL_INTERVAL}'
      history: '0'
      trends: '0'
      value_type: TEXT
      description: Master HTTP item used by dependent items. History is disabled
        intentionally.
      url: '{$CENTRAL.GATEWAY.URL}/api/v1/device/{$CENTRAL.DEVICE.KEY}/raw'
      request_method: GET
      timeout: 20s
      status_codes: '200'
      tags:
      - tag: component
        value: ap
    - uuid: 6145811d2c4a40a1b3e58d81472d612c
      name: AP gateway status
      type: DEPENDENT
      key: central.device.gateway_status
      value_type: CHAR
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.gateway.status
      master_item:
        key: central.device.raw
      triggers:
      - uuid: 4a31e94ad67a45f9bfd26220ba2c4a93
        expression: last(/HPE Aruba Central NG - AP/central.device.gateway_status)<>"ok"
        name: 'AP {HOST.NAME}: Central gateway data is stale or unavailable'
        priority: WARNING
    - uuid: d176fb5c663b4cc3ba352c698e2e69ba
      name: AP status
      type: DEPENDENT
      key: central.device.status
      value_type: CHAR
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.summary.status
      master_item:
        key: central.device.raw
      triggers:
      - uuid: 503c17b27f2d443b93715ebe60b3e856
        expression: last(/HPE Aruba Central NG - AP/central.device.status)<>"ONLINE"
        name: 'AP {HOST.NAME}: not online'
        priority: HIGH
    - uuid: 9dfed9f0f56043338837c2bfb6cf5926
      name: AP firmware
      type: DEPENDENT
      key: central.device.firmware
      value_type: CHAR
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.summary.firmware
      master_item:
        key: central.device.raw
    - uuid: 3c1b0d4781fa48d8bfdeb7d5e1fd56bf
      name: AP uptime
      type: DEPENDENT
      key: central.device.uptime_ms
      value_type: UNSIGNED
      units: uptime
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.summary.uptime_seconds
      master_item:
        key: central.device.raw
    - uuid: 92cd47b770da4fd6b7c582f8e93c2143
      name: AP recommended firmware
      type: DEPENDENT
      key: central.device.firmware_recommended
      value_type: CHAR
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.summary.firmware_recommended_version
      master_item:
        key: central.device.raw
    - uuid: cf7f31ad5449491aad796c742b96c15a
      name: AP firmware last upgraded
      type: DEPENDENT
      key: central.device.firmware_last_upgraded
      value_type: CHAR
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.summary.firmware_last_upgraded_at
      master_item:
        key: central.device.raw
    - uuid: 00ca760e1e084e3daf4ae9b8a85b7c73
      name: AP radio down count
      type: DEPENDENT
      key: central.ap.radio_down_count
      value_type: UNSIGNED
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.summary.radio_down_count
      master_item:
        key: central.device.raw
      triggers:
      - uuid: 53286e7531334cd981ce39ac8d04e98d
        expression: last(/HPE Aruba Central NG - AP/central.ap.radio_down_count)>0
          and last(/HPE Aruba Central NG - AP/central.device.status)="ONLINE"
        name: 'AP {HOST.NAME}: one or more radios are down'
        priority: AVERAGE
    - uuid: 60b5f07f642d4170859605ca25d1f266
      name: AP port down count
      type: DEPENDENT
      key: central.device.port_down_count
      value_type: UNSIGNED
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.summary.port_down_count
      master_item:
        key: central.device.raw
    - uuid: 4761215301cb4f95838ab1b3070d4392
      name: AP error count
      type: DEPENDENT
      key: central.device.error_count
      value_type: UNSIGNED
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.summary.error_count
      master_item:
        key: central.device.raw
    - uuid: 64a1300bed224c3698a7f7e99a8d8a3f
      name: AP CPU utilization
      type: DEPENDENT
      key: central.device.cpu_utilization
      value_type: FLOAT
      units: '%'
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.summary.cpu_utilization
      master_item:
        key: central.device.raw
    - uuid: 95232aaba0034578a6fc6effcca6ed4d
      name: AP memory utilization
      type: DEPENDENT
      key: central.device.memory_utilization
      value_type: FLOAT
      units: '%'
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.summary.memory_utilization
      master_item:
        key: central.device.raw

