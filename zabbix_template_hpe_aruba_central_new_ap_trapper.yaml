                - $.version_status.template.current
          master_item:
            key: central.collector.health
          tags:
            - tag: component
              value: collector
            - tag: scope
              value: update
        - uuid: 41db693fa4734073a8e58727965c60bd
          name: 'Latest template package version on GitHub'
          type: DEPENDENT
          key: central.template.version_latest
          value_type: CHAR
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.version_status.template.latest
          master_item:
            key: central.collector.health
          tags:
            - tag: component
              value: collector
            - tag: scope
              value: update
        - uuid: a9893b1ff2ee476fb1d24b0570210711
          name: 'Template update status'
          type: DEPENDENT
          key: central.template.update_status
          value_type: CHAR
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.version_status.template.status
          master_item:
            key: central.collector.health
          tags:
            - tag: component
              value: collector
            - tag: scope
              value: update
          triggers:
            - uuid: db6bb4f76f724c6a8f8eea15b72488b1
              expression: 'last(/HPE Aruba Central New AP by trapper/central.template.update_status)="outdated"'
              name: 'HPE Central collector: newer Zabbix template version available on GitHub'
              priority: INFO
              tags:
                - tag: scope
                  value: update
        - uuid: 245cdb6bd8fd4398b63cba94832764c5
          name: 'Central active alerts summary'
          type: TRAP
          key: central.alerts.summary
          history: 7d
          trends: '0'
          value_type: TEXT
          tags:
            - tag: component
              value: alerts
            - tag: source
              value: central
        - uuid: 95091df1f0e04b8ca3c79c906127d586
          name: 'Central active alerts count'
          type: DEPENDENT
          key: central.alerts.active_count
          value_type: UNSIGNED
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.active_count
          master_item:
            key: central.alerts.summary
          tags:
            - tag: component
              value: alerts
            - tag: source
              value: central
          triggers:
            - uuid: cb58d2a1976042ea9d013ae79c25ff52
              expression: 'last(/HPE Aruba Central New AP by trapper/central.alerts.active_count)>0 and last(/HPE Aruba Central New AP by trapper/central.alerts.critical_count)=0'
              name: 'HPE Central: active alerts present'
              priority: WARNING
              tags:
                - tag: scope
                  value: central-alerts
        - uuid: 96f47e658d1546a3ac80cf8063471b37
          name: 'Central active critical alerts count'
          type: DEPENDENT
          key: central.alerts.critical_count
          value_type: UNSIGNED
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.severity_counts.Critical
              error_handler: CUSTOM_VALUE
              error_handler_params: '0'
          master_item:
            key: central.alerts.summary
          tags:
            - tag: component
              value: alerts
            - tag: source
              value: central
          triggers:
            - uuid: 429bc4993e764844920690e0718133a0
              expression: 'last(/HPE Aruba Central New AP by trapper/central.alerts.critical_count)>0'
              name: 'HPE Central: active critical alerts present'
              priority: HIGH
              tags:
                - tag: scope
                  value: central-alerts
        - uuid: 36c754ce8bce413abc4fb5b14c1a120b
          name: 'Central alert mode'
          type: DEPENDENT
          key: central.alerts.mode
          value_type: CHAR
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.mode
          master_item:
            key: central.alerts.summary
          tags:
            - tag: component
              value: alerts
            - tag: source
              value: central
      discovery_rules:
        - uuid: 9b85ae54c35f4b3bb76ebb872dce8fdb
          name: 'HPE Central alert discovery'
          type: TRAP
          key: central.alerts.discovery
          lifetime: 7d
          description: 'Receives active Central alert low-level discovery JSON from the external collector.'
          item_prototypes:
            - uuid: a801d95979c24f4aa67c0a9f69707fdd
              name: 'Central alert {#ALERT_NAME}: data'
              type: TRAP
              key: 'central.alert.raw[{#TENANT_ID},{#ALERT_ID}]'
              history: '0'
              trends: '0'
              value_type: TEXT
              tags:
                - tag: component
                  value: alerts
                - tag: tenant
                  value: '{#TENANT_NAME}'
                - tag: workspace
                  value: '{#WORKSPACE_NAME}'
                - tag: source
                  value: central
                - tag: severity
                  value: '{#ALERT_SEVERITY}'
                - tag: category
                  value: '{#ALERT_CATEGORY}'
                - tag: device_type
                  value: '{#ALERT_DEVICE_TYPE}'
                - tag: site
                  value: '{#SITE_NAME}'
            - uuid: 4b6361b0e4cf46ec90175aed639cae38
              name: 'Central alert {#ALERT_NAME}: status'
              type: DEPENDENT
              key: 'central.alert.status[{#TENANT_ID},{#ALERT_ID}]'
              value_type: CHAR
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.status
              master_item:
                key: 'central.alert.raw[{#TENANT_ID},{#ALERT_ID}]'
              tags:
                - tag: component
                  value: alerts
                - tag: tenant
                  value: '{#TENANT_NAME}'
                - tag: workspace
                  value: '{#WORKSPACE_NAME}'
                - tag: source
                  value: central
                - tag: severity
                  value: '{#ALERT_SEVERITY}'
                - tag: category
                  value: '{#ALERT_CATEGORY}'
                - tag: device_type
                  value: '{#ALERT_DEVICE_TYPE}'
                - tag: site
                  value: '{#SITE_NAME}'
            - uuid: a7a67bbcdb414ddfb521cc871322adf5
              name: 'Central alert {#ALERT_NAME}: summary'
              type: DEPENDENT
              key: 'central.alert.summary[{#TENANT_ID},{#ALERT_ID}]'
              value_type: TEXT
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.summary
              master_item:
                key: 'central.alert.raw[{#TENANT_ID},{#ALERT_ID}]'
              tags:
                - tag: component
                  value: alerts
                - tag: tenant
                  value: '{#TENANT_NAME}'
                - tag: workspace
                  value: '{#WORKSPACE_NAME}'
                - tag: source
                  value: central
                - tag: severity
                  value: '{#ALERT_SEVERITY}'
                - tag: category
                  value: '{#ALERT_CATEGORY}'
                - tag: device_type
                  value: '{#ALERT_DEVICE_TYPE}'
                - tag: site
                  value: '{#SITE_NAME}'
        - uuid: 38779af1b07c484cb01e80a45feaf5ea
          name: 'HPE GreenLake subscription discovery'
          type: TRAP
          key: central.licenses.discovery
          lifetime: 7d
          description: 'Receives GreenLake subscription low-level discovery JSON from the external collector.'
          item_prototypes:
            - uuid: a7a1242b27a9475e90259b837b41e14e
              name: 'License {#LICENSE_OWNER_NAME} {#LICENSE_TIER} {#LICENSE_KEY_SUFFIX}: data'
              type: TRAP
              key: 'central.license.raw[{#LICENSE_SCOPE},{#LICENSE_OWNER_ID},{#LICENSE_ID}]'
