zabbix_export:
  version: '7.0'
  template_groups:
    - uuid: 3df659d334944e499deaa7d70c579f6f
      name: Templates/Network devices
  templates:
    - uuid: f42fc68d35654a888ae61f3997c4ed0d
      template: 'HPE Aruba Central New AP by trapper'
      name: 'HPE Aruba Central New AP by trapper'
      description: |
        Monitors HPE Aruba Networking Central Next Gen access points through an external collector.
        Designed for Zabbix Cloud: the collector runs outside Zabbix and pushes values with zabbix_sender.
      groups:
        - name: Templates/Network devices
      macros:
        - macro: '{$CENTRAL.COLLECTOR.NODATA}'
          value: 15m
          description: 'Time without collector health updates before raising an alert.'
        - macro: '{$CENTRAL.LICENSE.EXPIRY.WARNING.DAYS}'
          value: '30'
          description: 'Raise a warning when a subscription expires within this number of days.'
        - macro: '{$CENTRAL.TEMPLATE.VERSION}'
          value: 0.5.2 # TEMPLATE_VERSION
          description: 'Version of this Zabbix template package.'
      items:
        - uuid: 73ddacbc76ef4db486d466d5a6acaa42
          name: 'Collector health'
          type: TRAP
          key: central.collector.health
          history: 7d
          trends: '0'
          value_type: TEXT
          tags:
            - tag: component
              value: collector
          triggers:
            - uuid: be58be36ee3e4e32a8e4dbb520657dc0
              expression: 'nodata(/HPE Aruba Central New AP by trapper/central.collector.health,{$CENTRAL.COLLECTOR.NODATA})=1'
              name: 'HPE Central collector: no data for {$CENTRAL.COLLECTOR.NODATA}'
              priority: HIGH
              tags:
                - tag: scope
                  value: availability
        - uuid: 14c40f79197949c385766f524c0fbd02
          name: 'Collector status'
          type: DEPENDENT
          key: central.collector.status
          value_type: CHAR
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.status
          master_item:
            key: central.collector.health
          tags:
            - tag: component
              value: collector
          triggers:
            - uuid: 99efa8223a1c47cb960bead71ec1c63b
              expression: 'last(/HPE Aruba Central New AP by trapper/central.collector.status)<>"ok"'
              name: 'HPE Central collector: status is not ok'
              priority: AVERAGE
              tags:
                - tag: scope
                  value: availability
        - uuid: 7d0e3b4465894da9933e66ce1efd5fed
          name: 'Collector tenant count'
          type: DEPENDENT
          key: central.collector.tenants_count
          value_type: UNSIGNED
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.tenants_count
          master_item:
            key: central.collector.health
          tags:
            - tag: component
              value: collector
        - uuid: 117987cbfd3b4d12aa7896bead407e47
          name: 'Collector device total'
          type: DEPENDENT
          key: central.collector.devices_total
          value_type: UNSIGNED
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.devices_total
          master_item:
            key: central.collector.health
          tags:
            - tag: component
              value: collector
        - uuid: deff2bb833cb43c18b701b846aeb56fa
          name: 'Collector device counts by type'
          type: DEPENDENT
          key: central.collector.device_counts_by_type
          trends: '0'
          value_type: TEXT
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.device_counts_by_type
          master_item:
            key: central.collector.health
          tags:
            - tag: component
              value: collector
        - uuid: d3ea71a8a71e4059bd829f22fad92b7f
          name: 'Collector device counts by tenant'
          type: DEPENDENT
          key: central.collector.device_counts_by_tenant
          trends: '0'
          value_type: TEXT
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.device_counts_by_tenant
          master_item:
            key: central.collector.health
          tags:
            - tag: component
              value: collector
        - uuid: 5a93a67df8ea492c96cba847902c46e0
          name: 'Collector elapsed time'
          type: DEPENDENT
          key: central.collector.elapsed_seconds
          value_type: FLOAT
          units: s
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.elapsed_seconds
          master_item:
            key: central.collector.health
          tags:
            - tag: component
              value: collector
        - uuid: 2c2ef8db6d204464b0fb5640528fa52d
          name: 'Collector package version status'
          type: DEPENDENT
          key: central.collector.version_status
          value_type: CHAR
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.version_status.status
          master_item:
            key: central.collector.health
          tags:
            - tag: component
              value: collector
            - tag: scope
              value: update
        - uuid: 42a0f13b96734559aafa819ca5a0badb
          name: 'Collector config status'
          type: DEPENDENT
          key: central.collector.config_status
          value_type: CHAR
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.config_status.status
          master_item:
            key: central.collector.health
          tags:
            - tag: component
              value: collector
            - tag: scope
              value: config
          triggers:
            - uuid: 19db1ed60d7d45f4a923e28d9c0c3fb5
              expression: 'last(/HPE Aruba Central New AP by trapper/central.collector.config_status)<>"current"'
              name: 'HPE Central collector: local workspaces.json should be reviewed'
              priority: INFO
              tags:
                - tag: scope
                  value: config
        - uuid: d700522630654f82b5abeb7222225df5
          name: 'Collector config expected version'
          type: DEPENDENT
          key: central.collector.config_expected_version
          value_type: CHAR
          preprocessing:
            - type: JSONPATH
