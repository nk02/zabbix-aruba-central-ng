                - $.config_status.missing_recommended_paths
          master_item:
            key: central.collector.health
          tags:
            - tag: component
              value: collector
            - tag: scope
              value: config
        - uuid: afeed5a8b56b44f4b3c38604fd617fac
          name: 'Collector version'
          type: DEPENDENT
          key: central.collector.version
          value_type: CHAR
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.version_status.collector.current
          master_item:
            key: central.collector.health
          tags:
            - tag: component
