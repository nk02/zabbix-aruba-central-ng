zabbix_export:
  version: '7.0'
  template_groups:
  - uuid: 16c613b93ff24082accf39ed4d3673a9
    name: Templates/Network devices
  templates:
  - uuid: 1849edd5b861448985393b6038f242dd
    template: HPE Aruba Central NG - Collector
    name: HPE Aruba Central NG - Collector
    description: Collector health, config, version, and subscription items for the
      external HPE Aruba Central collector.
    groups:
    - name: Templates/Network devices
    macros:
    - macro: '{$CENTRAL.COLLECTOR.NODATA}'
      value: 15m
      description: Time without collector health updates before raising an alert.
    - macro: '{$CENTRAL.LICENSE.EXPIRY.WARNING.DAYS}'
      value: '30'
      description: Raise a warning when a subscription expires within this number
        of days.
    - macro: '{$CENTRAL.TEMPLATE.VERSION}'
      value: 1.0.0-dev
      description: Version of this Zabbix template package.
    items:
    - uuid: 4e57de4d770d43a2bbc53933328a8b43
      name: Collector health
      type: TRAP
      key: central.collector.health
      history: 7d
      trends: '0'
      value_type: TEXT
      tags:
      - tag: component
        value: collector
      triggers:
      - uuid: ed813e080d974425b5f2c7dc27e2bfda
        expression: nodata(/HPE Aruba Central NG - Collector/central.collector.health,{$CENTRAL.COLLECTOR.NODATA})=1
        name: 'HPE Central collector: no data for {$CENTRAL.COLLECTOR.NODATA}'
        priority: HIGH
        tags:
        - tag: scope
          value: performance
    - uuid: 60caa0b646b34336bd8598083475ba36
      name: Collector status
      type: DEPENDENT
      key: central.collector.status
      value_type: CHAR
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.status
      master_item:
        key: central.collector.health
      tags:
      - tag: component
        value: collector
      triggers:
      - uuid: 8a327a9262254ef9b11825b65db28f17
        expression: last(/HPE Aruba Central NG - Collector/central.collector.status)<>"ok"
        name: 'HPE Central collector: status is not ok'
        priority: AVERAGE
        tags:
        - tag: scope
          value: performance
    - uuid: b63b92d082cb40b993795424b9c9f85d
      name: Collector workspace count
      type: DEPENDENT
      key: central.collector.workspace_count
      value_type: UNSIGNED
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.workspace_count
      master_item:
        key: central.collector.health
      tags:
      - tag: component
        value: collector
    - uuid: f17e7ff4cd564e63bba2ff70f3f4a030
      name: Collector tenant count
      type: DEPENDENT
      key: central.collector.tenants_count
      value_type: UNSIGNED
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.tenants_count
      master_item:
        key: central.collector.health
      tags:
      - tag: component
        value: collector
    - uuid: 19cb46a4a3d449978e08462024db200a
      name: Collector device total
      type: DEPENDENT
      key: central.collector.devices_total
      value_type: UNSIGNED
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.devices_total
      master_item:
        key: central.collector.health
      tags:
      - tag: component
        value: collector
    - uuid: b5b87b56a8fd4e23a457517750a647d7
      name: Collector elapsed time
      type: DEPENDENT
      key: central.collector.elapsed_seconds
      value_type: FLOAT
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.elapsed_seconds
      master_item:
        key: central.collector.health
      tags:
      - tag: component
        value: collector
      units: s
    - uuid: 8014378906664eadb609fb7ea7db4200
      name: Collector update status
      type: DEPENDENT
      key: central.collector.update_status
      value_type: CHAR
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.version_status.collector.status
      master_item:
        key: central.collector.health
      tags:
      - tag: component
        value: collector
      triggers:
      - uuid: 9351911b11424187844d5ca99c5d4d25
        expression: last(/HPE Aruba Central NG - Collector/central.collector.update_status)="outdated"
        name: 'HPE Central collector: newer collector version available on GitHub'
        priority: INFO
        tags:
        - tag: scope
          value: performance
    - uuid: 73970ec2837841fd90345d0cbaeb05a8
      name: Template update status
      type: DEPENDENT
      key: central.template.update_status
      value_type: CHAR
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.version_status.template.status
      master_item:
        key: central.collector.health
      tags:
      - tag: component
        value: collector
      triggers:
      - uuid: 18dec9da03f34997b5ee2deeae49de47
        expression: last(/HPE Aruba Central NG - Collector/central.template.update_status)="outdated"
        name: 'HPE Central collector: newer Zabbix template version available on GitHub'
        priority: INFO
        tags:
        - tag: scope
          value: performance
    - uuid: b65966bf3f5447f596df32c6b0ebfbae
      name: Collector config status
      type: DEPENDENT
      key: central.collector.config_status
      value_type: CHAR
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.config_status.status
      master_item:
        key: central.collector.health
      tags:
      - tag: component
        value: collector
      triggers:
      - uuid: 203afb98b1134679a3c24b241936e053
        expression: last(/HPE Aruba Central NG - Collector/central.collector.config_status)<>"current"
        name: 'HPE Central collector: local workspaces.json should be reviewed'
        priority: INFO
        tags:
        - tag: scope
          value: performance
    - uuid: e046405d7bd3465cb8b52f8b3153d4dc
      name: Collector config missing recommended paths
      type: DEPENDENT
      key: central.collector.config_missing_recommended_paths
      value_type: TEXT
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.config_status.missing_recommended_paths
      master_item:
        key: central.collector.health
      tags:
      - tag: component
        value: collector
    discovery_rules:
    - uuid: 2f6459e3c7024a9f87beb2352328406d
      name: HPE GreenLake subscription discovery
      type: TRAP
      key: central.licenses.discovery
      lifetime: 7d
      item_prototypes:
      - uuid: 13c926bf8d884b77a8629b0a1abef640
        name: 'License {#LICENSE_OWNER_NAME} {#LICENSE_TIER} {#LICENSE_KEY_SUFFIX}:
          data'
        type: TRAP
        key: central.license.raw[{#LICENSE_SCOPE},{#LICENSE_OWNER_ID},{#LICENSE_ID}]
        history: '0'
        trends: '0'
        value_type: TEXT
        tags:
        - tag: component
          value: license
      - uuid: ec7f8b0f66be4a5c9a2f222fe2a93c86
        name: 'License {#LICENSE_OWNER_NAME} {#LICENSE_TIER} {#LICENSE_KEY_SUFFIX}:
          days until expiry'
        type: DEPENDENT
        key: central.license.days_until_expiry[{#LICENSE_SCOPE},{#LICENSE_OWNER_ID},{#LICENSE_ID}]
        value_type: FLOAT
        preprocessing:
        - type: JSONPATH
          parameters:
          - $.days_until_expiry
        master_item:
          key: central.license.raw[{#LICENSE_SCOPE},{#LICENSE_OWNER_ID},{#LICENSE_ID}]
        tags:
        - tag: component
          value: license
        units: d
      - uuid: fcf1c3fcc40749f095111c4614b651ef
        name: 'License {#LICENSE_OWNER_NAME} {#LICENSE_TIER} {#LICENSE_KEY_SUFFIX}:
          available quantity'
        type: DEPENDENT
        key: central.license.available[{#LICENSE_SCOPE},{#LICENSE_OWNER_ID},{#LICENSE_ID}]
        value_type: UNSIGNED
        preprocessing:
        - type: JSONPATH
          parameters:
          - $.available_quantity
        master_item:
          key: central.license.raw[{#LICENSE_SCOPE},{#LICENSE_OWNER_ID},{#LICENSE_ID}]
        tags:
        - tag: component
          value: license
      - uuid: 22c06dec84174c13ad2e6bbef23d450c
        name: 'License {#LICENSE_OWNER_NAME} {#LICENSE_TIER} {#LICENSE_KEY_SUFFIX}:
          status'
        type: DEPENDENT
        key: central.license.status[{#LICENSE_SCOPE},{#LICENSE_OWNER_ID},{#LICENSE_ID}]
        value_type: CHAR
        preprocessing:
        - type: JSONPATH
          parameters:
          - $.subscription_status
        master_item:
          key: central.license.raw[{#LICENSE_SCOPE},{#LICENSE_OWNER_ID},{#LICENSE_ID}]
        tags:
        - tag: component
          value: license
      trigger_prototypes:
      - uuid: 8c6fd23737c9489ab40e92393e95d4f4
        expression: last(/HPE Aruba Central NG - Collector/central.license.days_until_expiry[{#LICENSE_SCOPE},{#LICENSE_OWNER_ID},{#LICENSE_ID}])<0
        name: 'License {#LICENSE_OWNER_NAME} {#LICENSE_TIER} {#LICENSE_KEY_SUFFIX}:
          expired'
        priority: HIGH
        tags:
        - tag: scope
          value: performance
      - uuid: b22b3a82aa2d4530a79f31ce4bb60aa6
        expression: last(/HPE Aruba Central NG - Collector/central.license.days_until_expiry[{#LICENSE_SCOPE},{#LICENSE_OWNER_ID},{#LICENSE_ID}])>=0
          and last(/HPE Aruba Central NG - Collector/central.license.days_until_expiry[{#LICENSE_SCOPE},{#LICENSE_OWNER_ID},{#LICENSE_ID}])<={$CENTRAL.LICENSE.EXPIRY.WARNING.DAYS}
        name: 'License {#LICENSE_OWNER_NAME} {#LICENSE_TIER} {#LICENSE_KEY_SUFFIX}:
          expires within {$CENTRAL.LICENSE.EXPIRY.WARNING.DAYS} days'
        priority: WARNING
        tags:
        - tag: scope
          value: performance
  - uuid: 29e9b9ac0a36463bbded19a0bdb2b59d
    template: HPE Aruba Central NG - Site
    name: HPE Aruba Central NG - Site
    description: Placeholder for future site-level aggregate HPE Aruba Central items.
    groups:
    - name: Templates/Network devices
    items:
    - uuid: 4621777c4ac544c28578bbec6cbba4ef
      name: Central site data
      type: TRAP
      key: central.site.raw
      history: '0'
      trends: '0'
      value_type: TEXT
      tags:
      - tag: component
        value: site
  - uuid: 5eee72e75c4a46dbacfac95d92e183cc
    template: HPE Aruba Central NG - AP
    name: HPE Aruba Central NG - AP
    description: Per-access-point HPE Aruba Central items pushed by the external collector.
    groups:
    - name: Templates/Network devices
    items:
    - uuid: e4e159a5ddd84b8089d3b6d9e714b804
      name: AP data
      type: TRAP
      key: central.ap.raw
      history: '0'
      trends: '0'
      value_type: TEXT
      tags:
      - tag: component
        value: raw
    - uuid: daa831916a2a4647a09d4425e8f633ff
      name: AP status
      type: DEPENDENT
      key: central.ap.status
      value_type: CHAR
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.status
      master_item:
        key: central.ap.raw
      tags:
      - tag: component
        value: availability
      triggers:
      - uuid: d8d43dd5ef1f41479e41a460def2f8f2
        expression: last(/HPE Aruba Central NG - AP/central.ap.status)<>"ONLINE"
        name: 'AP: not online'
        priority: HIGH
        tags:
        - tag: scope
          value: availability
    - uuid: 2c0d859f47444796a41237493b357c5c
      name: AP CPU utilization
      type: DEPENDENT
      key: central.ap.cpu
      value_type: FLOAT
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.cpu_utilization
      master_item:
        key: central.ap.raw
      tags:
      - tag: component
        value: cpu
      units: '%'
      triggers:
      - uuid: 0da0fa219fc14473be44af4ec72034ea
        expression: min(/HPE Aruba Central NG - AP/central.ap.cpu,15m)>85
        name: 'AP: high CPU utilization'
        priority: WARNING
        tags:
        - tag: scope
          value: performance
    - uuid: 90b75dbcbc10458498685a79a47ac339
      name: AP memory utilization
      type: DEPENDENT
      key: central.ap.memory
      value_type: FLOAT
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.memory_utilization
      master_item:
        key: central.ap.raw
      tags:
      - tag: component
        value: memory
      units: '%'
      triggers:
      - uuid: a02f330a52444d139489d5acd3139720
        expression: min(/HPE Aruba Central NG - AP/central.ap.memory,15m)>85
        name: 'AP: high memory utilization'
        priority: WARNING
        tags:
        - tag: scope
          value: performance
    - uuid: 7f6aa6260c0b4e1eb684de9518c3588f
      name: AP uptime
      type: DEPENDENT
      key: central.ap.uptime
      value_type: FLOAT
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.uptime_in_millis
      - type: MULTIPLIER
        parameters:
        - '0.001'
      master_item:
        key: central.ap.raw
      tags:
      - tag: component
        value: system
      units: s
    - uuid: a3103b6aad344564babff7ad9babd43f
      name: AP firmware
      type: DEPENDENT
      key: central.ap.firmware
      value_type: CHAR
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.firmware
      master_item:
        key: central.ap.raw
      tags:
      - tag: component
        value: inventory
    - uuid: 0010fe5c192f49f694ceb5eb2fdaaf0b
      name: AP connected wireless clients
      type: DEPENDENT
      key: central.ap.clients_connected
      value_type: UNSIGNED
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.clients_connected
        error_handler: CUSTOM_VALUE
        error_handler_params: '0'
      master_item:
        key: central.ap.raw
      tags:
      - tag: component
        value: clients
    - uuid: db3d5333866a4ddcbccbc0f66aaea12a
      name: AP eth0 status
      type: DEPENDENT
      key: central.ap.eth0.status
      value_type: CHAR
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.ports[?(@.name=="eth0")].status.first()
        error_handler: CUSTOM_VALUE
        error_handler_params: UNKNOWN
      master_item:
        key: central.ap.raw
      tags:
      - tag: component
        value: interface
      triggers:
      - uuid: e650657d65414d3b90fd04b907fec625
        expression: last(/HPE Aruba Central NG - AP/central.ap.status)="ONLINE"
          and last(/HPE Aruba Central NG - AP/central.ap.eth0.status)<>"UP"
        name: 'AP: eth0 is not up'
        priority: AVERAGE
        tags:
        - tag: scope
          value: availability
    - uuid: d2079ce31cea44d88bc9afa378f5cbd3
      name: AP eth0 speed
      type: DEPENDENT
      key: central.ap.eth0.speed
      value_type: UNSIGNED
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.ports[?(@.name=="eth0")].speed.first()
        error_handler: CUSTOM_VALUE
        error_handler_params: '0'
      - type: MULTIPLIER
        parameters:
        - '1000000'
      master_item:
        key: central.ap.raw
      tags:
      - tag: component
        value: interface
      units: bps
    discovery_rules:
    - uuid: 42b87a43588343d087bb5aa4ce548857
      name: HPE Central AP radio discovery
      type: TRAP
      key: central.ap.radios.discovery
      lifetime: 7d
      item_prototypes:
      - uuid: a3861d35e45842dda06bb6b8ea300fee
        name: 'AP radio {#RADIO_BAND}: data'
        type: TRAP
        key: central.ap.radio.raw[{#RADIO_NUMBER}]
        history: '0'
        trends: '0'
        value_type: TEXT
        tags:
        - tag: component
          value: radio
      - uuid: f125031d23e24fc3ab0d141a642b58fe
        name: 'AP radio {#RADIO_BAND}: AP status'
        type: DEPENDENT
        key: central.ap.radio.ap_status[{#RADIO_NUMBER}]
        value_type: CHAR
        preprocessing:
        - type: JSONPATH
          parameters:
          - $.ap_status
        master_item:
          key: central.ap.radio.raw[{#RADIO_NUMBER}]
        tags:
        - tag: component
          value: availability
      - uuid: a86ee7e223af4480aa6ff2d3be7d08a3
        name: 'AP radio {#RADIO_BAND}: status'
        type: DEPENDENT
        key: central.ap.radio.status[{#RADIO_NUMBER}]
        value_type: CHAR
        preprocessing:
        - type: JSONPATH
          parameters:
          - $.status
        master_item:
          key: central.ap.radio.raw[{#RADIO_NUMBER}]
        tags:
        - tag: component
          value: radio
      - uuid: 8bb95ffa4e97402e91473935f2180655
        name: 'AP radio {#RADIO_BAND}: channel utilization'
        type: DEPENDENT
        key: central.ap.radio.channel_utilization[{#RADIO_NUMBER}]
        value_type: FLOAT
        preprocessing:
        - type: JSONPATH
          parameters:
          - $.channel_utilization
          error_handler: CUSTOM_VALUE
          error_handler_params: '0'
        master_item:
          key: central.ap.radio.raw[{#RADIO_NUMBER}]
        tags:
        - tag: component
          value: radio
        units: '%'
      - uuid: 7fb9d21cb84d4a51b1bdb71ec03d0073
        name: 'AP radio {#RADIO_BAND}: noise floor'
        type: DEPENDENT
        key: central.ap.radio.noise_floor[{#RADIO_NUMBER}]
        value_type: FLOAT
        preprocessing:
        - type: JSONPATH
          parameters:
          - $.noise_floor
          error_handler: CUSTOM_VALUE
          error_handler_params: '-100'
        master_item:
          key: central.ap.radio.raw[{#RADIO_NUMBER}]
        tags:
        - tag: component
          value: radio
        units: dBm
      - uuid: bfed280609d7459ca3f9d9d58fe999c1
        name: 'AP radio {#RADIO_BAND}: channel'
        type: DEPENDENT
        key: central.ap.radio.channel[{#RADIO_NUMBER}]
        value_type: CHAR
        preprocessing:
        - type: JSONPATH
          parameters:
          - $.channel
        master_item:
          key: central.ap.radio.raw[{#RADIO_NUMBER}]
        tags:
        - tag: component
          value: radio
      trigger_prototypes:
      - uuid: 0ae35b01dbfd475ab7e5cbf7529dd31b
        expression: last(/HPE Aruba Central NG - AP/central.ap.radio.ap_status[{#RADIO_NUMBER}])="ONLINE"
          and last(/HPE Aruba Central NG - AP/central.ap.radio.status[{#RADIO_NUMBER}])<>"UP"
        name: 'AP: radio {#RADIO_BAND} is not up'
        priority: AVERAGE
        tags:
        - tag: scope
          value: availability
      - uuid: b30f845d662e487bb7c3c1a3f903dcf7
        expression: last(/HPE Aruba Central NG - AP/central.ap.radio.ap_status[{#RADIO_NUMBER}])="ONLINE"
          and min(/HPE Aruba Central NG - AP/central.ap.radio.channel_utilization[{#RADIO_NUMBER}],15m)>80
        name: 'AP: high radio {#RADIO_BAND} channel utilization'
        priority: WARNING
        tags:
        - tag: scope
          value: performance
      - uuid: f6dc417cc7484cb4bce9892781f5d5e0
        expression: last(/HPE Aruba Central NG - AP/central.ap.radio.ap_status[{#RADIO_NUMBER}])="ONLINE"
          and min(/HPE Aruba Central NG - AP/central.ap.radio.noise_floor[{#RADIO_NUMBER}],15m)>-85
        name: 'AP: high radio {#RADIO_BAND} noise floor'
        priority: WARNING
        tags:
        - tag: scope
          value: performance
