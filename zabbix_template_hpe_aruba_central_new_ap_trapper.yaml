            - tag: scope
              value: update
        - uuid: 8796d03b884b41dc9007ecfa1f932979
          name: 'Latest collector version on GitHub'
          type: DEPENDENT
          key: central.collector.version_latest
          value_type: CHAR
          preprocessing:
            - type: JSONPATH
