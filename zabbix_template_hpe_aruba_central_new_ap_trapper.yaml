              expression: 'last(/HPE Aruba Central New AP by trapper/central.license.days_until_expiry[{#LICENSE_SCOPE},{#LICENSE_OWNER_ID},{#LICENSE_ID}])<0'
              name: 'License {#LICENSE_OWNER_NAME} {#LICENSE_TIER} {#LICENSE_KEY_SUFFIX}: expired'
              priority: HIGH
              tags:
                - tag: scope
                  value: license
            - uuid: cf178b3590e1414697cd40723598102e
              expression: 'last(/HPE Aruba Central New AP by trapper/central.license.days_until_expiry[{#LICENSE_SCOPE},{#LICENSE_OWNER_ID},{#LICENSE_ID}])>=0 and last(/HPE Aruba Central New AP by trapper/central.license.days_until_expiry[{#LICENSE_SCOPE},{#LICENSE_OWNER_ID},{#LICENSE_ID}])<={$CENTRAL.LICENSE.EXPIRY.WARNING.DAYS}'
