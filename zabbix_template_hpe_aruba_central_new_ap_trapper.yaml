zabbix_export:
  version: '7.0'
  template_groups:
    - uuid: 3df659d334944e499deaa7d70c579f6f
      name: Templates/Network devices
  templates:
    - uuid: f42fc68d35654a888ae61f3997c4ed0d
      template: 'HPE Aruba Central New AP by trapper'
      name: 'HPE Aruba Central New AP by trapper'
      description: |
        Monitors HPE Aruba Networking Central Next Gen access points through an external collector.
        Designed for Zabbix Cloud: the collector runs outside Zabbix and pushes values with zabbix_sender.
      groups:
        - name: Templates/Network devices
      macros:
        - macro: '{$CENTRAL.COLLECTOR.NODATA}'
          value: 15m
          description: 'Time without collector health updates before raising an alert.'
      items:
        - uuid: 73ddacbc76ef4db486d466d5a6acaa42
          name: 'Collector health'
          type: TRAP
          key: central.collector.health
          history: 7d
          trends: '0'
          value_type: TEXT
          tags:
            - tag: component
              value: collector
          triggers:
            - uuid: be58be36ee3e4e32a8e4dbb520657dc0
              expression: 'nodata(/HPE Aruba Central New AP by trapper/central.collector.health,{$CENTRAL.COLLECTOR.NODATA})=1'
              name: 'HPE Central collector: no data for {$CENTRAL.COLLECTOR.NODATA}'
              priority: HIGH
              tags:
                - tag: scope
                  value: availability
        - uuid: 14c40f79197949c385766f524c0fbd02
          name: 'Collector status'
          type: DEPENDENT
          key: central.collector.status
          value_type: CHAR
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.status
          master_item:
            key: central.collector.health
          tags:
            - tag: component
              value: collector
          triggers:
            - uuid: 99efa8223a1c47cb960bead71ec1c63b
              expression: 'last(/HPE Aruba Central New AP by trapper/central.collector.status)<>"ok"'
              name: 'HPE Central collector: status is not ok'
              priority: AVERAGE
              tags:
                - tag: scope
                  value: availability
        - uuid: 7d0e3b4465894da9933e66ce1efd5fed
          name: 'Collector tenant count'
          type: DEPENDENT
          key: central.collector.tenants_count
          value_type: UNSIGNED
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.tenants_count
          master_item:
            key: central.collector.health
          tags:
            - tag: component
              value: collector
        - uuid: 117987cbfd3b4d12aa7896bead407e47
          name: 'Collector device total'
          type: DEPENDENT
          key: central.collector.devices_total
          value_type: UNSIGNED
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.devices_total
          master_item:
            key: central.collector.health
          tags:
            - tag: component
              value: collector
        - uuid: deff2bb833cb43c18b701b846aeb56fa
          name: 'Collector device counts by type'
          type: DEPENDENT
          key: central.collector.device_counts_by_type
          trends: '0'
          value_type: TEXT
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.device_counts_by_type
          master_item:
            key: central.collector.health
          tags:
            - tag: component
              value: collector
        - uuid: d3ea71a8a71e4059bd829f22fad92b7f
          name: 'Collector device counts by tenant'
          type: DEPENDENT
          key: central.collector.device_counts_by_tenant
          trends: '0'
          value_type: TEXT
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.device_counts_by_tenant
          master_item:
            key: central.collector.health
          tags:
            - tag: component
              value: collector
        - uuid: 5a93a67df8ea492c96cba847902c46e0
          name: 'Collector elapsed time'
          type: DEPENDENT
          key: central.collector.elapsed_seconds
          value_type: FLOAT
          units: s
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.elapsed_seconds
          master_item:
            key: central.collector.health
          tags:
            - tag: component
              value: collector
      discovery_rules:
        - uuid: c69fa6a70a39417aaec9d913a27c21ce
          name: 'HPE Central AP discovery'
          type: TRAP
          key: central.aps.discovery
          lifetime: 7d
          description: 'Receives AP low-level discovery JSON from the external collector.'
          item_prototypes:
            - uuid: 390e887acb594b89add38768102113a6
              name: 'AP {#DEVICE_NAME}: data'
              type: TRAP
              key: 'central.ap.raw[{#TENANT_ID},{#DEVICE_SERIAL}]'
              history: '0'
              trends: '0'
              value_type: TEXT
              tags:
                - tag: component
                  value: raw
                - tag: tenant
                  value: '{#TENANT_NAME}'
                - tag: workspace
                  value: '{#WORKSPACE_NAME}'
            - uuid: 267b4365757c4f7dbf17442285904480
              name: 'AP {#DEVICE_NAME}: status'
              type: DEPENDENT
              key: 'central.ap.status[{#TENANT_ID},{#DEVICE_SERIAL}]'
              value_type: CHAR
              preprocessing:
                - type: JSONPATH
                  parameters:
                    - $.status
              master_item:
                key: 'central.ap.raw[{#TENANT_ID},{#DEVICE_SERIAL}]'
              tags:
                - tag: component
