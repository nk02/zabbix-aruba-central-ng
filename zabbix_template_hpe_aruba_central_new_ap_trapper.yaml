              expression: 'last(/HPE Aruba Central New AP by trapper/central.collector.update_status)="outdated"'
              name: 'HPE Central collector: newer collector version available on GitHub'
              priority: INFO
              tags:
                - tag: scope
                  value: update
        - uuid: c8f13b06d9114f3f810263be5afd3f34
          name: 'Template package version'
          type: DEPENDENT
          key: central.template.version
          value_type: CHAR
