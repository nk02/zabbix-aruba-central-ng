zabbix_export:
  version: '7.0'
  template_groups:
  - uuid: c8bb804cfbbd4128975e12db65aa0687
    name: Templates/Network devices
  templates:
  - uuid: 377ff8cffa794233ba75c18b6aa8c9a3
    template: HPE Aruba Central NG - Gateway
    name: HPE Aruba Central NG - Gateway
    description: Health checks for the HPE Aruba Central NG gateway/cache service.
    groups:
    - name: Templates/Network devices
    macros:
    - macro: '{$CENTRAL.GATEWAY.POLL_INTERVAL}'
      value: 1m
      description: Gateway health polling interval.
    - macro: '{$CENTRAL.GATEWAY.NODATA}'
      value: 10m
      description: Time without gateway health data before raising an alert.
    - macro: '{$CENTRAL.SYNC.MAX_AGE_SECONDS}'
      value: '7200'
      description: Maximum allowed age of the last successful gateway state sync, in seconds.
    - macro: '{$CENTRAL.TEMPLATE.VERSION}'
      value: 2.0.10
      description: Version of this template package.
    items:
    - uuid: e77cd7deb4b645d8a881aab339804248
      name: Gateway health raw
      type: HTTP_AGENT
      key: central.gateway.health.raw
      delay: '{$CENTRAL.GATEWAY.POLL_INTERVAL}'
      history: 1d
      trends: '0'
      value_type: TEXT
      url: '{$CENTRAL.GATEWAY.URL}/api/v2/health'
      request_method: GET
      timeout: 10s
      status_codes: '200'
      tags:
      - tag: component
        value: gateway
      triggers:
      - uuid: 5ef684a140614c36bb6d1ecf1c96ddfc
        expression: nodata(/HPE Aruba Central NG - Gateway/central.gateway.health.raw,{$CENTRAL.GATEWAY.NODATA})=1
        name: 'HPE Central gateway: no health data received'
        priority: HIGH
    - uuid: c5197dad779b4a48a6da2e1918b3238a
      name: Gateway status
      type: DEPENDENT
      key: central.gateway.status
      value_type: CHAR
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.gateway.status
      master_item:
        key: central.gateway.health.raw
      triggers:
      - uuid: 386501bdef40492c8705f6e70f534411
        expression: last(/HPE Aruba Central NG - Gateway/central.gateway.status)<>"ok"
        name: 'HPE Central gateway: status is not ok'
        priority: HIGH
    - uuid: 1309a02d2e384bde88dca851288f9594
      name: Gateway version
      type: DEPENDENT
      key: central.gateway.version
      value_type: CHAR
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.gateway.version
      master_item:
        key: central.gateway.health.raw
    - uuid: d239394651e043b8a169ef1401c27639
      name: Gateway managed device count
      type: DEPENDENT
      key: central.gateway.device_count
      value_type: UNSIGNED
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.state.device_count
      master_item:
        key: central.gateway.health.raw
    - uuid: b8b193cb63534b81849d612155c17e06
      name: Gateway stale managed host count
      type: DEPENDENT
      key: central.gateway.stale_managed_host_count
      value_type: UNSIGNED
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.zabbix.stale_managed_host_count
      master_item:
        key: central.gateway.health.raw
    - uuid: 5fdd4388a2834f3c8551d53325a81b3e
      name: Gateway stale managed host names
      type: DEPENDENT
      key: central.gateway.stale_managed_host_names
      value_type: TEXT
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.zabbix.stale_managed_host_names
      master_item:
        key: central.gateway.health.raw
      triggers:
      - uuid: 86520a8dc7bf4876a3514310f7773e86
        expression: last(/HPE Aruba Central NG - Gateway/central.gateway.stale_managed_host_names)<>""
        name: 'HPE Central gateway: stale managed hosts: {ITEM.LASTVALUE}'
        priority: WARNING
    - uuid: 3952ec5d581a450eaebe242c46060436
      name: Gateway last sync age
      type: DEPENDENT
      key: central.gateway.sync_state_age_seconds
      value_type: UNSIGNED
      units: s
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.state.generated_at_age_seconds
      master_item:
        key: central.gateway.health.raw
      triggers:
      - uuid: 3b1829ded38046a197f884c25f6c1431
        expression: last(/HPE Aruba Central NG - Gateway/central.gateway.sync_state_age_seconds)>{$CENTRAL.SYNC.MAX_AGE_SECONDS}
        name: 'HPE Central gateway: Zabbix sync state is stale'
        priority: HIGH
    - uuid: d631233083364f6f8fe40f2b642535fc
      name: Gateway cache entries
      type: DEPENDENT
      key: central.gateway.cache_entries
      value_type: UNSIGNED
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.cache.entries
      master_item:
        key: central.gateway.health.raw
    - uuid: 3c1919f2ffb149259b847f1161e5c14b
      name: Gateway API rate limit
      type: DEPENDENT
      key: central.gateway.rate_limit_per_second
      value_type: UNSIGNED
      units: req/s
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.rate_limit.per_second
      master_item:
        key: central.gateway.health.raw
    - uuid: a83639c195f54c5584c3c0b471576a86
      name: Gateway package status
      type: DEPENDENT
      key: central.gateway.package_status
      value_type: CHAR
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.package.status
      master_item:
        key: central.gateway.health.raw
      triggers:
      - uuid: a36f7f7145154f699adbfb5c0f126406
        expression: last(/HPE Aruba Central NG - Gateway/central.gateway.package_status)="outdated"
        name: 'HPE Central gateway: package update available'
        priority: WARNING
    - uuid: b1470eefeee14533bafe3b424ad2c94d
      name: Gateway latest app version
      type: DEPENDENT
      key: central.gateway.app_latest_version
      value_type: CHAR
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.package.app.latest
      master_item:
        key: central.gateway.health.raw
    - uuid: 5cecb6e6bad64708a4fc732b3083b0be
      name: Gateway latest template version
      type: DEPENDENT
      key: central.gateway.template_latest_version
      value_type: CHAR
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.package.template.latest
      master_item:
        key: central.gateway.health.raw

  - uuid: b525b1eac6a24f859fbcec657130987d
    template: HPE Aruba Central NG - Site
    name: HPE Aruba Central NG - Site
    description: Site health and client onboarding monitoring through the HPE Aruba
      Central NG gateway/cache service.
    groups:
    - name: Templates/Network devices
    macros:
    - macro: '{$CENTRAL.SITE.POLL_INTERVAL}'
      value: 5m
    - macro: '{$CENTRAL.SITE.ONBOARDING.POLL_INTERVAL}'
      value: 10m
    items:
    - uuid: 05611274213042419df37a7beec22f22
      name: Site health raw master item
      type: HTTP_AGENT
      key: central.site.health.raw
      delay: '{$CENTRAL.SITE.POLL_INTERVAL}'
      history: '0'
      trends: '0'
      value_type: TEXT
      description: Master HTTP item used by dependent site health items.
      url: '{$CENTRAL.GATEWAY.URL}/api/v2/site/{$CENTRAL.SITE.ID}/health'
      request_method: GET
      timeout: 20s
      status_codes: '200'
      tags:
      - tag: component
        value: site
    - uuid: 70bcf4b4b1424b7d937538643f16113e
      name: Site gateway status
      type: DEPENDENT
      key: central.site.gateway_status
      value_type: CHAR
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.gateway.status
      master_item:
        key: central.site.health.raw
      triggers:
      - uuid: 66fd3bec70ef43678ba9b7ce862a7d73
        expression: last(/HPE Aruba Central NG - Site/central.site.gateway_status)<>"ok"
        name: 'Site {HOST.NAME}: Central gateway data is unavailable'
        priority: WARNING
    - uuid: a70346895c1d4f34a9cdd82630405f0e
      name: Site health good score
      type: DEPENDENT
      key: central.site.health.good
      value_type: FLOAT
      units: '%'
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.data.health.groups[?(@.name=="Good")].value.first()
      master_item:
        key: central.site.health.raw
    - uuid: dc4b6ab192ff4afca17323788f4de670
      name: Site health fair score
      type: DEPENDENT
      key: central.site.health.fair
      value_type: FLOAT
      units: '%'
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.data.health.groups[?(@.name=="Fair")].value.first()
      master_item:
        key: central.site.health.raw
    - uuid: 395097270ec44a3fb9ee5120d51b888b
      name: Site health poor score
      type: DEPENDENT
      key: central.site.health.poor
      value_type: FLOAT
      units: '%'
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.data.health.groups[?(@.name=="Poor")].value.first()
      master_item:
        key: central.site.health.raw
      triggers:
      - uuid: 9103c7efdfb94720988f248671064cb5
        expression: last(/HPE Aruba Central NG - Site/central.site.health.poor)>0
        name: 'Site {HOST.NAME}: poor health detected'
        priority: AVERAGE
    - uuid: 2fedbfbdc29342bf80eff691981b73ef
      name: Site client onboarding raw master item
      type: HTTP_AGENT
      key: central.site.client_onboarding.raw
      delay: '{$CENTRAL.SITE.ONBOARDING.POLL_INTERVAL}'
      history: '0'
      trends: '0'
      value_type: TEXT
      description: Master HTTP item used by dependent client onboarding items.
      url: '{$CENTRAL.GATEWAY.URL}/api/v2/site/{$CENTRAL.SITE.ID}/client-onboarding-stage/count?field=topreasons&window-ms=3600000'
      request_method: GET
      timeout: 20s
      status_codes: '200'
      tags:
      - tag: component
        value: site
    - uuid: 7afa7bad719f4492a30c76e422bf6548
      name: Site client onboarding failed count
      type: DEPENDENT
      key: central.site.client_onboarding.failed_count
      value_type: UNSIGNED
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.data.count
      master_item:
        key: central.site.client_onboarding.raw
      triggers:
      - uuid: 3bdd3dded06d44bc9c8375bc8225b9d5
        expression: last(/HPE Aruba Central NG - Site/central.site.client_onboarding.failed_count)>50
        name: 'Site {HOST.NAME}: high client onboarding failure count'
        priority: WARNING
        status: DISABLED

